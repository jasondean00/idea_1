<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelle Investment</title>

    <link rel="stylesheet" href="home.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    
    <header>
        <div class="logo">
            👜 Pelle Investment
        </div>
    </header>

    
    <section class="actions">

        <div class="action-card">
            <a href="payment.html">
                <i class="fas fa-wallet"></i>
                <span id="paymentBtn">Payment</span>
            </a>
        </div>

        <div class="action-card">
            <i class="fas fa-money-bill-wave"></i>
            <span>Withdrawal</span>
        </div>

        <div class="action-card">
            <i class="fas fa-headset"></i>
            <span>Customer Service</span>
        </div>

    </section>

    
    <section class="products" id="products">

        

    </section>

    
    <div id="investModal" class="modal">

        <div class="modal-content">

            <span class="close-btn">&times;</span>

            <img id="bagImage" src="" alt="Bag Image">

            <h2 id="bagName"></h2>

            <div class="bag-info">

                <p>
                    <strong>Price:</strong>
                    <span id="bagPrice"></span> GHS
                </p>

                <p>
                    <strong>Daily Income:</strong>
                    <span id="bagDaily"></span> GHS
                </p>

                <p>
                    <strong>Total Income:</strong>
                    <span id="bagTotal"></span> GHS
                </p>

                <p>
                    <strong>Duration:</strong>
                    <span id="bagCycle"></span> Days
                </p>

            </div>

            <button id="confirmInvest">
                Confirm Investment
            </button>

        </div>

    </div>

    
    <nav class="bottom-nav">

        <a href="#">
            <i class="fas fa-box"></i>
            <span>Product</span>
        </a>

        <a href="#">
            <i class="fas fa-bag-shopping"></i>
            <span>My Product</span>
        </a>

        <a href="#">
            <i class="fas fa-users"></i>
            <span>My Team</span>
        </a>

        <a href="#">
            <i class="fas fa-user"></i>
            <span>Mine</span>
        </a>

    </nav>
    <script>
        document.getElementById("paymentBtn").addEventListener("click", () => {
        window.location.href = "payment.html";});
    </script>

    <script src="home.js"></script>

</body>
</html>
