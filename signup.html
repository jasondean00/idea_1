<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelle Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="signup-card">
        <h1>👜 Pelle Bag Investment</h1>
        <p class="subtitle">
            Create your account and start investing.
        </p>

        <form>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Contact Information</label>
                <input type="email" placeholder="Enter your Contact Information">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password">
            </div>

            <div class="input-group">
                <label>Invitation Code</label>
                <input type="text" placeholder="Enter invitation code (if any)">
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="login-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</body>
</html>
