<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal</title>
    <link rel="stylesheet" href="withdrawal.css">
</head>
<body>

    <div class="container">
        <div class="withdraw-card">
            <h2>Withdrawal Request</h2>

            <form id="withdrawForm">

                <div class="input-group">
                    <label>Account Holder Name</label>
                    <input type="text" id="name" placeholder="Enter account holder name" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="number" id="number" placeholder="Enter phone number" required>
                </div>

                <div class="input-group">
                    <label>Network</label>
                    <select id="network" required>
                        <option value="">Select Network</option>
                        <option>MTN</option>
                        <option>Telecel</option>
                        <option>AirtelTigo</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="Enter withdrawal amount" required>
                </div>

                <button type="submit" class="confirm-btn">
                    Confirm Withdrawal
                </button>

            </form>
        </div>
    </div>

    <script>
document.getElementById("withdrawForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const amount = Number(document.getElementById("amount").value);

    if (amount <= 50) {
        alert("Minimum withdrawal amount is 51.");
        return;
    }

    alert("Withdrawal request submitted successfully.\nPending confirmation.");

    window.location.href = "home.html";
});
</script>

</body>
</html>
